site_name: "Exploring Enterprise Linux"
site_url: https://linux.bradpenney.io
site_description: Enterprise Linux for developers and early-career professionals — from first SSH login to production system administration.
site_author: Brad Penney

extra:
  analytics:
    provider: google
    property: G-V01MJ4R3SQ
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bradpenney
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/bradpenney

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: amber
  logo: images/exploring_linux.png
  favicon: images/exploring_linux.png
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.code.highlight
    - content.tooltips
    - content.code.mermaid

plugins:
  - search
  - meta
  - exclude:
      glob:
        # New structure — all drafts
        - "day_one/first_tasks.md"
        - "efficiency/*"
        - "mastery/*"
        # Old pre-overhaul directories — pending migration or deletion
        - "administering_linux/*"
        - "automation/*"
        - "basic_toolset/*"
        - "development/*"
        - "essential_concepts/*"
        - "getting_around/*"
        - "level_1/*"
        - "level_2/*"
        - "level_3/*"
        - "level_4/*"
        - "level_5/*"
        - "level_6/*"
        - "scripting/*"
        - "text_processing/*"
        - "tuning/*"
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1a202c"
        color: "#cbd5e0"
  - htmlproofer:
      enabled: true
      validate_rendered_template: true
      validate_external_urls: false
      raise_error: true
      raise_error_after_finish: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

nav:
  - Home: index.md

  - 🏥 Day One:
      - Overview: day_one/overview.md
      - Getting Access: day_one/getting_access.md
      - Orientation: day_one/orientation.md
      - Understanding Permissions: day_one/permissions.md
      - Safe Exploration: day_one/safe_exploration.md
      - Reading Logs: day_one/reading_logs.md
      - Finding Documentation: day_one/finding_docs.md
      - The "Don't Do This" Guide: day_one/safety_guide.md

  - 📦 Essentials:
      - Command Line Fundamentals: essentials/command_line_fundamentals.md
      - Filesystem Hierarchy: essentials/filesystem_hierarchy.md
      - Finding Files: essentials/finding_files.md
      - Finding Help: essentials/finding_help.md
      - File Permissions: essentials/file_permissions.md
      - Users and Groups: essentials/users_and_groups.md
      - Pipes and Redirection: essentials/pipes_and_redirection.md
      - grep: essentials/grep.md
      - Processes: essentials/processes.md

  # ⚡ Efficiency — Daily-use tools for working Linux professionals
  # - ⚡ Efficiency:
  #     - Services with systemd: efficiency/systemd.md
  #     - sed: efficiency/sed.md
  #     - Bash Scripting Basics: efficiency/bash_scripting_basics.md
  #     - Bash Scripting Patterns: efficiency/bash_scripting_patterns.md
  #     - Package Management: efficiency/package_management.md
  #     - Networking Basics: efficiency/networking_basics.md
  #     - Shell Shortcuts and History: efficiency/shell_shortcuts.md

  # 🎯 Mastery — Production-grade Linux for the serious professional
  # - 🎯 Mastery:
  #     - Storage and Filesystems: mastery/storage_and_filesystems.md
  #     - Logical Volume Management: mastery/lvm.md
  #     - Network File Shares: mastery/network_file_shares.md
  #     - System Tuning: mastery/system_tuning.md
  #     - Containers with Podman: mastery/containers.md
  #     - Text Editors: mastery/text_editors.md
  #     - Terminal Tools: mastery/terminal_tools.md
